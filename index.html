<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Cerebro Artificial Colectivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .nodo-flotante {
            animation: float 5s ease-in-out infinite;
        }
        .modal-abierto {
            overflow: hidden;
        }
        @keyframes fondoCambiante {
            0% { background: linear-gradient(135deg, #0f172a, #1e293b); }
            25% { background: linear-gradient(135deg, #1e293b, #2d3748); }
            50% { background: linear-gradient(135deg, #0f172a, #1a202c); }
            75% { background: linear-gradient(135deg, #1a202c, #2d3748); }
            100% { background: linear-gradient(135deg, #0f172a, #1e293b); }
        }
        .fondo-ecosistemas {
            animation: fondoCambiante 20s ease-in-out infinite;
        }
        .nodo-flotante {
            transition: all 0.3s ease-in-out;
        }
        .hover-glow-cyan:hover {
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.4);
            background-color: rgba(6, 182, 212, 0.1);
        }
        .hover-glow-amber:hover {
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.4);
            background-color: rgba(245, 158, 11, 0.1);
        }
        .hover-glow-emerald:hover {
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
            background-color: rgba(16, 185, 129, 0.1);
        }
        .hover-glow-purple:hover {
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
            background-color: rgba(168, 85, 247, 0.1);
        }
        .hover-glow-blue:hover {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
            background-color: rgba(59, 130, 246, 0.1);
        }
        /* Transición para las tarjetas de indicadores */
        .indicador-card {
            transition: all 0.2s ease;
        }
        .indicador-card:hover {
            transform: scale(1.02);
            background-color: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body class="fondo-ecosistemas text-white font-sans h-screen overflow-hidden flex flex-col p-6 relative">

    <!-- Fondo de emojis de paisajes (sutil) -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden opacity-5 text-8xl flex flex-wrap justify-around items-center p-20">
        <span>🏔️</span> <span>🦒</span> <span>🌳</span> <span>🌿</span> <span>🌊</span>
        <span>🏔️</span> <span>🦒</span> <span>🌳</span> <span>🌿</span> <span>🌊</span>
        <span>🏔️</span> <span>🦒</span> <span>🌳</span> <span>🌿</span> <span>🌊</span>
        <span>🏔️</span> <span>🦒</span> <span>🌳</span> <span>🌿</span> <span>🌊</span>
    </div>

    <!-- HEADER -->
    <header class="relative z-10 flex justify-between items-center bg-slate-900/40 border border-slate-800 p-4 rounded-2xl shrink-0 shadow-xl">
        <div class="flex items-center gap-3 cursor-pointer" onclick="resetearConsola()">
            <div class="w-3 h-3 rounded-full bg-cyan-400 animate-ping"></div>
            <h1 class="text-sm font-black tracking-widest uppercase text-cyan-400">LIAMM, tu cerebro Artificial</h1>
        </div>
        <span class="text-[10px] font-mono bg-emerald-500/10 text-emerald-400 px-2.5 py-1 rounded-full border border-emerald-500/20 uppercase">IA Core Online</span>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="relative z-10 flex-1 my-4 flex flex-col overflow-hidden">
        
        <!-- Mapa de Nodos -->
        <div id="mapa-nodos-central" class="absolute inset-0 flex flex-col items-center justify-center">
            
            <!-- Cerebro Central -->
            <div class="w-24 h-24 rounded-full bg-cyan-500/10 border border-cyan-500/30 flex items-center justify-center mb-8 shadow-[0_0_60px_rgba(6,182,212,0.15)] text-7xl">
                🧠
            </div>
            
            <!-- Tarjetas de los 5 Investigadores -->
            <div class="flex flex-wrap justify-center gap-6 max-w-5xl w-full px-6">
                <button onclick="abrirPerfilInvestigador('Mathias')" 
                        class="nodo-flotante bg-slate-900/80 border border-slate-800 rounded-2xl p-5 text-center hover:border-cyan-500 hover-glow-cyan min-w-[140px] flex-1" 
                        style="animation-delay: 0s;">
                    <div class="text-5xl mb-2">🏔️</div>
                    <h3 class="text-sm font-bold text-cyan-400 uppercase tracking-wide">Mathias Ñiquen</h3>
                    <p class="text-xs text-slate-400 mt-1">Alta Montaña y Nieve</p>
                </button>

                <button onclick="abrirPerfilInvestigador('Luis')" 
                        class="nodo-flotante bg-slate-900/80 border border-slate-800 rounded-2xl p-5 text-center hover:border-amber-500 hover-glow-amber min-w-[140px] flex-1" 
                        style="animation-delay: 0.6s;">
                    <div class="text-5xl mb-2">🦒</div>
                    <h3 class="text-sm font-bold text-amber-400 uppercase tracking-wide">Luis Ramírez</h3>
                    <p class="text-xs text-slate-400 mt-1">La Sabana</p>
                </button>

                <button onclick="abrirPerfilInvestigador('Amanda')" 
                        class="nodo-flotante bg-slate-900/80 border border-slate-800 rounded-2xl p-5 text-center hover:border-emerald-500 hover-glow-emerald min-w-[140px] flex-1" 
                        style="animation-delay: 1.2s;">
                    <div class="text-5xl mb-2">🌳</div>
                    <h3 class="text-sm font-bold text-emerald-400 uppercase tracking-wide">Amanda Alvarado</h3>
                    <p class="text-xs text-slate-400 mt-1">Bosques</p>
                </button>

                <button onclick="abrirPerfilInvestigador('Mazzimiliano')" 
                        class="nodo-flotante bg-slate-900/80 border border-slate-800 rounded-2xl p-5 text-center hover:border-purple-500 hover-glow-purple min-w-[140px] flex-1" 
                        style="animation-delay: 1.8s;">
                    <div class="text-5xl mb-2">🌿</div>
                    <h3 class="text-sm font-bold text-purple-400 uppercase tracking-wide">Mazzimiliano Vargas</h3>
                    <p class="text-xs text-slate-400 mt-1">Pradera</p>
                </button>

                <button onclick="abrirPerfilInvestigador('Isabela')" 
                        class="nodo-flotante bg-slate-900/80 border border-slate-800 rounded-2xl p-5 text-center hover:border-blue-500 hover-glow-blue min-w-[140px] flex-1" 
                        style="animation-delay: 2.4s;">
                    <div class="text-5xl mb-2">🌊</div>
                    <h3 class="text-sm font-bold text-blue-400 uppercase tracking-wide">Isabela Pernalete</h3>
                    <p class="text-xs text-slate-400 mt-1">Océanos</p>
                </button>
            </div>
        </div>

        <!-- Zona de Chat -->
        <div id="zona-chat-central" class="hidden absolute inset-0 bg-slate-900/10 border border-slate-900 rounded-2xl p-4 overflow-y-auto flex flex-col justify-end">
            <div id="pantalla-chat" class="flex-1 overflow-y-auto space-y-4 pr-2 py-2">
                <!-- Mensajes -->
            </div>
        </div>

    </div>

    <!-- BARRA DE BÚSQUEDA -->
    <footer class="relative z-10 shrink-0 bg-slate-900 border border-slate-800 p-2 rounded-2xl flex items-center gap-3 shadow-2xl">
        <input id="input-busqueda" 
               type="text" 
               placeholder="Consulte al Cerebro Artificial sobre cualquier ecosistema (Ej: Veo cazadores en la sabana...)" 
               class="flex-1 bg-transparent px-4 py-3 text-sm focus:outline-none placeholder-slate-500 text-white" 
               onkeypress="if(event.key === 'Enter') enviarPregunta()">
        <button onclick="enviarPregunta()" 
                class="bg-cyan-500 hover:bg-cyan-600 text-slate-950 font-black text-xs px-6 py-4 rounded-xl uppercase tracking-wider transition-all">
            Preguntar IA
        </button>
    </footer>

    <!-- ======= MODAL (contenedor vacío) ======= -->
    <div id="modal-perfil" class="hidden fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4 backdrop-blur-sm" onclick="cerrarModal()">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl max-w-4xl w-full p-6 space-y-4 max-h-[90vh] overflow-y-auto shadow-2xl" onclick="event.stopPropagation();">
            <div id="modal-contenido">
                <!-- Se llena dinámicamente desde JavaScript -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
